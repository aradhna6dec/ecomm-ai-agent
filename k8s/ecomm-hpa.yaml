apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ecomm-ai-agent-hpa
  namespace: ecomm-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ecomm-ai-agent
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70